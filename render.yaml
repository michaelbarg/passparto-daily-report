services:
  - type: cron
    name: passparto-daily-report
    env: python
    schedule: "0 5 * * *"  # 08:00 Israel (UTC+3)
    buildCommand: pip install -r requirements.txt
    startCommand: cd src && python main.py
    envVars:
      - key: KLAVIYO_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MICHAEL_EMAIL
        sync: false
